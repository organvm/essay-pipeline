name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout essay-pipeline
        uses: actions/checkout@v6

      - name: Checkout editorial-standards
        uses: actions/checkout@v6
        with:
          repository: organvm-v-logos/editorial-standards
          path: editorial-standards-checkout

      - name: Symlink editorial-standards as sibling for schema path resolution
        run: ln -s "$GITHUB_WORKSPACE/editorial-standards-checkout" "$GITHUB_WORKSPACE/../editorial-standards"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
