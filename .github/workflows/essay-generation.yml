name: Essay Generation

on:
  schedule:
    - cron: "0 6 * * 2"  # Tuesday 06:00 UTC
    - cron: "0 6 * * 3"  # Wednesday 06:00 UTC
    - cron: "0 6 * * 5"  # Friday 06:00 UTC
  workflow_dispatch:
    inputs:
      suggestion_index:
        description: "Index into topic-suggestions.json (default: auto from day-of-week)"
        required: false
        default: ""
      provider:
        description: "LLM provider override"
        required: false
        default: ""

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout essay-pipeline
        uses: actions/checkout@v7

      - name: Checkout editorial-standards
        uses: actions/checkout@v7
        with:
          repository: organvm-v-logos/editorial-standards
          path: editorial-standards

      - name: Checkout public-process
        uses: actions/checkout@v7
        with:
          repository: organvm-v-logos/public-process
          path: public-process

      - name: Checkout reading-observatory (feeds only)
        uses: actions/checkout@v7
        with:
          repository: organvm-v-logos/reading-observatory
          path: reading-observatory
          sparse-checkout: feeds/

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Determine suggestion index
        id: index
        run: |
          MANUAL_INDEX="${{ github.event.inputs.suggestion_index }}"
          if [ -n "$MANUAL_INDEX" ]; then
            echo "index=$MANUAL_INDEX" >> "$GITHUB_OUTPUT"
          else
            # Map day-of-week: Tue=0, Wed=1, Fri=2
            DOW=$(date -u +%u)
            case $DOW in
              2) echo "index=0" >> "$GITHUB_OUTPUT" ;;
              3) echo "index=1" >> "$GITHUB_OUTPUT" ;;
              5) echo "index=2" >> "$GITHUB_OUTPUT" ;;
              *) echo "index=0" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Generate essay draft
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          PROVIDER_ARG=""
          if [ -n "${{ github.event.inputs.provider }}" ]; then
            PROVIDER_ARG="--provider ${{ github.event.inputs.provider }}"
          fi

          python -m src.essay_drafter \
            --suggestions data/topic-suggestions.json \
            --suggestion-index ${{ steps.index.outputs.index }} \
            --template-dir editorial-standards/templates/ \
            --schema editorial-standards/schemas/frontmatter-schema.yaml \
            --rubric editorial-standards/schemas/quality-rubric.yaml \
            --tag-governance editorial-standards/schemas/tag-governance.yaml \
            --category-taxonomy editorial-standards/schemas/category-taxonomy.yaml \
            --posts-dir public-process/_posts/ \
            --output-dir _public/_posts/ \
            --sprint-narrative data/sprint-narrative-draft.md \
            $PROVIDER_ARG

      - name: Validate draft
        run: |
          python -m src.validator \
            --posts-dir _public/_posts/ \
            --schema editorial-standards/schemas/frontmatter-schema.yaml

      - name: Create PR in public-process
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_DISPATCH_TOKEN }}
        run: |
          # Find the generated draft
          DRAFT_FILE=$(ls _public/_posts/*.md | head -1)
          DRAFT_NAME=$(basename "$DRAFT_FILE")
          BRANCH_NAME="auto-essay/$(date -u +%Y-%m-%d)"

          cd public-process

          # Create branch and add draft
          git checkout -b "$BRANCH_NAME"
          cp "../$DRAFT_FILE" "_posts/$DRAFT_NAME"
          git add "_posts/$DRAFT_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "essay: auto-draft $DRAFT_NAME"
          git push origin "$BRANCH_NAME"

          # Create PR
          gh pr create \
            --title "Auto-draft: $DRAFT_NAME" \
            --label "auto-draft,auto-merge-48h" \
            --body "$(cat <<'EOF'
          ## Auto-Generated Essay Draft

          This essay was automatically generated by the essay-pipeline.

          **Topic source:** suggestion index ${{ steps.index.outputs.index }} from `data/topic-suggestions.json`
          **Auto-merge:** This PR will be automatically merged after 48 hours unless the `hold` label is applied.

          ### Review checklist
          - [ ] Read the essay for accuracy and tone
          - [ ] Verify no fabricated repo names or metrics
          - [ ] Check that frontmatter passes validation
          - [ ] Apply `hold` label if changes needed

          > To prevent auto-merge, add the `hold` label to this PR.

          ---
          *Generated by essay-pipeline v0.3.0*
          EOF
          )"
