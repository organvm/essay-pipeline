name: Daily Captain's Log

on:
  schedule:
    - cron: "0 7 * * *"  # Daily 07:00 UTC
  workflow_dispatch:

jobs:
  log:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout essay-pipeline
        uses: actions/checkout@v7

      - name: Checkout public-process
        uses: actions/checkout@v7
        with:
          repository: organvm-v-logos/public-process
          path: public-process
          token: ${{ secrets.CROSS_ORG_DISPATCH_TOKEN || secrets.ORCHESTRATION_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate captain's log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.log_generator \
            --mode github-api \
            --logs-dir public-process/_logs/ \
            --data-dir public-process/data/

      - name: Create PR in public-process
        env:
          GH_TOKEN: ${{ secrets.CROSS_ORG_DISPATCH_TOKEN || secrets.ORCHESTRATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::No cross-org token available; skipping PR creation."
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          BRANCH_NAME="auto-log/$TODAY"

          cd public-process
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/organvm-v-logos/public-process.git"

          # Check if there are changes
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No log changes to commit"
            exit 0
          fi

          git checkout -b "$BRANCH_NAME"
          git add _logs/ data/activity/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-scaffold captain's log $TODAY"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Captain's Log: $TODAY" \
            --label "auto-draft,auto-merge-48h" \
            --body "$(cat <<'EOF'
          ## Auto-Generated Captain's Log Scaffold

          Activity data collected from GitHub Events API across all ORGANVM orgs.
          The log scaffold needs human review to fill in the narrative sections.

          **Auto-merge:** This PR will be automatically merged after 48 hours unless the `hold` label is applied.

          > Apply the `hold` label to prevent auto-merge and edit the narrative sections.

          ---
          *Generated by essay-pipeline log_generator v0.3.0*
          EOF
          )"
